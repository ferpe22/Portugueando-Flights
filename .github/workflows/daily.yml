name: Busqueda diaria de vuelos

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  buscar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - run: python flight_tracker.py
        env:
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      - name: Guardar resultados en el repo
        run: |
          git config user.name "flight-bot"
          git config user.email "bot@portugueando.local"
          git add results.json
          git commit -m "Actualiza resultados" || echo "sin cambios"
          git push